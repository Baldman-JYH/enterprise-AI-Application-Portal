<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>企业 AI 门户 Demo - 移动端</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="mobile-shell">
    <header class="mobile-header">
      <div>
        <p class="eyebrow">Mobile Demo</p>
        <h1>企业 AI 随身工作入口</h1>
      </div>
      <a class="nav-link" href="../index.html">返回导航</a>
    </header>

    <section class="phone-frame">
      <div class="phone-inner">
        <section class="hero-card">
          <p class="hero-kicker">先说需求，不先找系统</p>
          <h2 id="heroTitle">在手机上也能直接发起企业工作请求。</h2>
          <p id="heroText">统一入口承接会议、制度、差旅、权限、采购等工作场景，再由内部智能体分流执行。</p>
        </section>

        <section class="role-switch" aria-label="角色切换">
          <button class="role-btn is-active" data-role="user">用户视角</button>
          <button class="role-btn" data-role="admin">管理员视角</button>
        </section>

        <section class="composer-card">
          <label for="mobilePrompt">移动端工作请求</label>
          <textarea id="mobilePrompt" rows="4">帮我安排明天下午和采购部的项目评审会议，并生成议程。</textarea>
          <button class="primary-btn" id="runActionBtn">开始处理</button>
        </section>

        <section class="chip-grid" id="quickChips"></section>

        <section class="stack" id="userView">
          <article class="glass-card">
            <p class="card-kicker">AI 理解</p>
            <h3 id="userResultTitle">等待发起</h3>
            <p id="userResultText">选择常用任务或直接输入需求后，这里会展示 AI 对用户意图的理解结果。</p>
          </article>

          <article class="glass-card">
            <p class="card-kicker">今日任务</p>
            <div id="userTaskList" class="list-block"></div>
          </article>

          <article class="glass-card">
            <p class="card-kicker">待确认</p>
            <div id="userPendingList" class="list-block"></div>
          </article>
        </section>

        <section class="stack is-hidden" id="adminView">
          <article class="glass-card metric-grid">
            <div class="metric-card">
              <span>今日 Tokens</span>
              <strong>1.82M</strong>
            </div>
            <div class="metric-card">
              <span>今日成本</span>
              <strong>¥ 3,240</strong>
            </div>
            <div class="metric-card">
              <span>待审批</span>
              <strong>7</strong>
            </div>
            <div class="metric-card">
              <span>活跃 Agent</span>
              <strong>14</strong>
            </div>
          </article>

          <article class="glass-card">
            <p class="card-kicker">模型与调用</p>
            <div id="adminModelList" class="list-block"></div>
          </article>

          <article class="glass-card">
            <p class="card-kicker">治理告警</p>
            <div id="adminAlertList" class="list-block"></div>
          </article>
        </section>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
