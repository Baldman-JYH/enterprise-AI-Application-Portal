<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%2310a37f'/%3E%3Cpath d='M18 33h28M32 19v28' stroke='%23ffffff' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E" />
  <title>企业智能工作入口 | 统一登录</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f4;
      --panel: rgba(255, 255, 255, 0.95);
      --border: rgba(15, 23, 42, 0.08);
      --text: #202123;
      --muted: #667085;
      --accent: #10a37f;
      --shadow: 0 24px 80px rgba(15, 23, 42, 0.10);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 12%, rgba(16, 163, 127, 0.10), transparent 24%),
        radial-gradient(circle at 88% 18%, rgba(15, 23, 42, 0.05), transparent 18%),
        linear-gradient(180deg, #fcfcf9 0%, #eef2ea 100%);
    }
    .shell {
      width: min(1080px, calc(100vw - 40px));
      margin: 0 auto;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 24px;
      align-items: center;
      padding: 32px 0;
    }
    .brand-panel,
    .login-card {
      border-radius: 32px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.86));
      box-shadow: var(--shadow);
    }
    .brand-panel {
      padding: 40px;
      display: grid;
      gap: 20px;
      min-height: 520px;
      align-content: center;
    }
    .eyebrow {
      margin: 0;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
    }
    h1,
    h2 {
      margin: 0;
      letter-spacing: -0.04em;
    }
    h1 {
      font-size: clamp(40px, 6vw, 72px);
      line-height: 1.02;
    }
    .brand-panel p,
    .login-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
    }
    .brand-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .brand-tags span,
    .role-pill {
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.82);
      display: inline-flex;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
    }
    .login-card {
      padding: 28px;
      display: grid;
      gap: 18px;
    }
    .role-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .role-pill {
      cursor: pointer;
      color: var(--text);
      transition: border-color 180ms ease, background 180ms ease, transform 180ms ease;
    }
    .role-pill.active {
      background: rgba(16, 163, 127, 0.10);
      border-color: rgba(16, 163, 127, 0.32);
    }
    .field {
      display: grid;
      gap: 8px;
    }
    .field label {
      color: var(--muted);
      font-size: 13px;
    }
    .field input {
      width: 100%;
      min-height: 52px;
      padding: 0 16px;
      border-radius: 18px;
      border: 1px solid rgba(15, 23, 42, 0.10);
      background: rgba(255, 255, 255, 0.92);
      font: inherit;
      color: var(--text);
      outline: none;
    }
    .field input:focus {
      border-color: rgba(16, 163, 127, 0.45);
      box-shadow: 0 0 0 4px rgba(16, 163, 127, 0.12);
    }
    .submit-row {
      display: grid;
      gap: 12px;
    }
    .button {
      min-height: 52px;
      border-radius: 18px;
      border: 0;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .button.primary {
      background: #202123;
      color: #ffffff;
      box-shadow: 0 12px 28px rgba(32, 33, 35, 0.14);
    }
    .button.secondary {
      background: rgba(255, 255, 255, 0.84);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .error {
      min-height: 18px;
      color: #c2410c;
      font-size: 13px;
    }
    @media (max-width: 960px) {
      .shell {
        grid-template-columns: 1fr;
      }
      .brand-panel {
        min-height: auto;
      }
    }
    @media (max-width: 720px) {
      .shell {
        width: min(100vw - 24px, 1080px);
        padding: 18px 0 24px;
      }
      .brand-panel,
      .login-card {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="brand-panel">
      <p class="eyebrow">Enterprise AI</p>
      <h1>企业智能工作入口</h1>
      <p>登录后按角色直接进入工作入口或治理控制台，手机端支持单独预览。</p>
      <div class="brand-tags">
        <span>统一对话入口</span>
        <span>历史对话保留</span>
        <span>部门工具专区</span>
        <span>反馈记录闭环</span>
      </div>
    </section>

    <section class="login-card">
      <div>
        <p class="eyebrow">Sign In</p>
        <h2>统一登录</h2>
        <p>使用企业账号进入系统。</p>
      </div>

      <div class="role-pills" id="roleSelector">
        <button class="role-pill active" type="button" data-role="user">员工账号</button>
        <button class="role-pill" type="button" data-role="admin">管理员账号</button>
      </div>

      <form id="loginForm">
        <div class="field">
          <label for="accountInput">企业账号</label>
          <input id="accountInput" type="text" autocomplete="username" value="zhang.san" />
        </div>
        <div class="field">
          <label for="passwordInput">登录密码</label>
          <input id="passwordInput" type="password" autocomplete="current-password" value="Demo@2026" />
        </div>
        <div class="error" id="errorText"></div>
        <div class="submit-row">
          <button class="button primary" type="submit">登录</button>
          <button class="button secondary" id="ssoButton" type="button">企业 SSO</button>
          <button class="button secondary" id="previewButton" type="button">手机端预览</button>
        </div>
      </form>
    </section>
  </main>

  <script>
    (function () {
      var authKey = 'enterprise-ai-demo-auth';
      var profileKey = 'enterprise-ai-demo-profile';
      var routeMap = {
        user: './demo-balanced-workspace/',
        admin: './demo-admin-console/'
      };
      var defaultProfiles = {
        user: { account: 'zhang.san', password: 'Demo@2026', name: '张三', role: 'user' },
        admin: { account: 'admin.ai', password: 'Demo@2026', name: '周敏', role: 'admin' }
      };
      if (sessionStorage.getItem(authKey)) {
        var currentProfile = {};
        try {
          currentProfile = JSON.parse(sessionStorage.getItem(profileKey) || '{}');
        } catch (error) {
          currentProfile = {};
        }
        window.location.replace(routeMap[currentProfile.role] || routeMap.user);
        return;
      }
      var activeRole = 'user';
      var roleSelector = document.getElementById('roleSelector');
      var accountInput = document.getElementById('accountInput');
      var passwordInput = document.getElementById('passwordInput');
      var errorText = document.getElementById('errorText');
      var loginForm = document.getElementById('loginForm');
      var ssoButton = document.getElementById('ssoButton');
      var previewButton = document.getElementById('previewButton');

      function applyRole(role) {
        activeRole = role;
        var profile = defaultProfiles[role];
        accountInput.value = profile.account;
        passwordInput.value = profile.password;
        roleSelector.querySelectorAll('.role-pill').forEach(function (button) {
          button.classList.toggle('active', button.dataset.role === role);
        });
        errorText.textContent = '';
      }

      function persistAndEnter(profile) {
        sessionStorage.setItem(authKey, '1');
        sessionStorage.setItem(profileKey, JSON.stringify(profile));
        window.location.href = routeMap[profile.role] || routeMap.user;
      }

      roleSelector.addEventListener('click', function (event) {
        var button = event.target.closest('.role-pill');
        if (!button) return;
        applyRole(button.dataset.role);
      });

      loginForm.addEventListener('submit', function (event) {
        event.preventDefault();
        var account = accountInput.value.trim();
        var password = passwordInput.value.trim();
        if (!account || !password) {
          errorText.textContent = '请输入账号和密码。';
          return;
        }
        var profile = defaultProfiles[activeRole];
        persistAndEnter({ account: account, name: profile.name, role: activeRole });
      });

      ssoButton.addEventListener('click', function () {
        persistAndEnter(defaultProfiles[activeRole]);
      });

      previewButton.addEventListener('click', function () {
        window.location.href = './demo-mobile/?role=' + activeRole;
      });

      applyRole(activeRole);
    })();
  </script>
</body>
</html>
