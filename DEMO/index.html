<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%2310a37f'/%3E%3Cpath d='M18 33h28M32 19v28' stroke='%23ffffff' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E" />
  <title>企业智能工作入口 | 统一登录</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f4;
      --panel: rgba(255, 255, 255, 0.96);
      --panel-soft: rgba(255, 255, 255, 0.88);
      --border: rgba(15, 23, 42, 0.08);
      --text: #202123;
      --muted: #667085;
      --accent: #10a37f;
      --shadow: 0 28px 72px rgba(15, 23, 42, 0.08);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 0% 0%, rgba(16, 163, 127, 0.10), transparent 28%),
        radial-gradient(circle at 100% 16%, rgba(15, 23, 42, 0.05), transparent 22%),
        linear-gradient(180deg, #fcfcf9 0%, #f1f3eb 100%);
    }
    .shell {
      width: min(1140px, calc(100vw - 40px));
      margin: 0 auto;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1.04fr 0.96fr;
      gap: 32px;
      align-items: center;
      padding: 32px 0;
    }
    .brand-panel,
    .login-card {
      border-radius: 34px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.97), rgba(255, 255, 255, 0.90));
      box-shadow: var(--shadow);
    }
    .brand-panel {
      padding: 48px;
      display: grid;
      gap: 28px;
      min-height: 560px;
      align-content: center;
    }
    .eyebrow {
      margin: 0;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
    }
    h1,
    h2,
    h3 {
      margin: 0;
      letter-spacing: -0.04em;
    }
    h1 {
      font-size: clamp(44px, 6vw, 76px);
      line-height: 1.01;
    }
    .brand-copy {
      display: grid;
      gap: 12px;
    }
    .brand-copy p,
    .login-card p,
    .feature-item p {
      margin: 0;
      color: var(--muted);
      line-height: 1.78;
    }
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .feature-item {
      padding: 18px 18px 16px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.84);
    }
    .feature-item h3 {
      font-size: 17px;
      margin-bottom: 6px;
    }
    .login-card {
      padding: 32px;
      display: grid;
      gap: 22px;
      background: linear-gradient(180deg, var(--panel), var(--panel-soft));
    }
    .login-head {
      display: grid;
      gap: 8px;
    }
    .login-head p {
      margin: 0;
    }
    .role-pills {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      padding: 6px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: rgba(247, 248, 244, 0.86);
    }
    .role-pill {
      min-height: 44px;
      border-radius: 16px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      font: inherit;
      cursor: pointer;
      transition: background 180ms ease, color 180ms ease, border-color 180ms ease, transform 180ms ease;
    }
    .role-pill.active {
      background: #202123;
      color: #ffffff;
      border-color: #202123;
      box-shadow: 0 10px 24px rgba(32, 33, 35, 0.14);
    }
    .field {
      display: grid;
      gap: 8px;
    }
    .field label {
      color: var(--muted);
      font-size: 13px;
    }
    .field input {
      width: 100%;
      min-height: 56px;
      padding: 0 18px;
      border-radius: 20px;
      border: 1px solid rgba(15, 23, 42, 0.10);
      background: #fbfbf8;
      font: inherit;
      color: var(--text);
      outline: none;
      font-size: 15px;
    }
    .field input:focus {
      border-color: rgba(16, 163, 127, 0.45);
      box-shadow: 0 0 0 4px rgba(16, 163, 127, 0.10);
    }
    .submit-row {
      display: grid;
      gap: 10px;
    }
    .button {
      min-height: 52px;
      border-radius: 20px;
      border: 0;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease, background 180ms ease;
    }
    .button:hover,
    .role-pill:hover {
      transform: translateY(-1px);
    }
    .button.primary {
      background: #202123;
      color: #ffffff;
      box-shadow: 0 12px 28px rgba(32, 33, 35, 0.14);
    }
    .button.secondary {
      background: rgba(255, 255, 255, 0.88);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .error {
      min-height: 18px;
      color: #c2410c;
      font-size: 13px;
    }
    @media (max-width: 960px) {
      .shell {
        grid-template-columns: 1fr;
      }
      .brand-panel {
        min-height: auto;
      }
    }
    @media (max-width: 720px) {
      .shell {
        width: min(100vw - 24px, 1140px);
        padding: 18px 0 24px;
      }
      .brand-panel,
      .login-card {
        padding: 24px;
      }
      .role-pills,
      .feature-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="brand-panel">
      <div class="brand-copy">
        <p class="eyebrow">Enterprise AI</p>
        <h1>企业智能工作入口</h1>
        <p>统一接入对话、任务执行、部门工具与运营治理能力。</p>
      </div>
      <div class="feature-grid">
        <article class="feature-item">
          <h3>对话入口</h3>
          <p>从一个输入框发起工作需求，保留历史会话与执行状态。</p>
        </article>
        <article class="feature-item">
          <h3>部门工具</h3>
          <p>按角色与权限查看部门工具，控制可见、可用与可下载范围。</p>
        </article>
        <article class="feature-item">
          <h3>反馈闭环</h3>
          <p>对话支持点赞和点踩，反馈可进入管理员侧统一查看。</p>
        </article>
        <article class="feature-item">
          <h3>移动协同</h3>
          <p>手机端可单独预览，查看任务摘要与角色对应信息。</p>
        </article>
      </div>
    </section>

    <section class="login-card">
      <div class="login-head">
        <p class="eyebrow">Sign In</p>
        <h2>统一登录</h2>
        <p>使用企业账号进入系统。</p>
      </div>

      <div class="role-pills" id="roleSelector">
        <button class="role-pill active" type="button" data-role="user">员工账号</button>
        <button class="role-pill" type="button" data-role="admin">管理员账号</button>
      </div>

      <form id="loginForm">
        <div class="field">
          <label for="accountInput">企业账号</label>
          <input id="accountInput" type="text" autocomplete="username" value="zhang.san" />
        </div>
        <div class="field">
          <label for="passwordInput">登录密码</label>
          <input id="passwordInput" type="password" autocomplete="current-password" value="Demo@2026" />
        </div>
        <div class="error" id="errorText"></div>
        <div class="submit-row">
          <button class="button primary" type="submit">登录</button>
          <button class="button secondary" id="ssoButton" type="button">企业 SSO</button>
          <button class="button secondary" id="previewButton" type="button">手机端预览</button>
        </div>
      </form>
    </section>
  </main>

  <script>
    (function () {
      var authKey = 'enterprise-ai-demo-auth';
      var profileKey = 'enterprise-ai-demo-profile';
      var routeMap = {
        user: './demo-balanced-workspace/',
        admin: './demo-admin-console/'
      };
      var defaultProfiles = {
        user: { account: 'zhang.san', password: 'Demo@2026', name: '张三', role: 'user' },
        admin: { account: 'admin.ai', password: 'Demo@2026', name: '周敏', role: 'admin' }
      };
      if (sessionStorage.getItem(authKey)) {
        var currentProfile = {};
        try {
          currentProfile = JSON.parse(sessionStorage.getItem(profileKey) || '{}');
        } catch (error) {
          currentProfile = {};
        }
        window.location.replace(routeMap[currentProfile.role] || routeMap.user);
        return;
      }
      var activeRole = 'user';
      var roleSelector = document.getElementById('roleSelector');
      var accountInput = document.getElementById('accountInput');
      var passwordInput = document.getElementById('passwordInput');
      var errorText = document.getElementById('errorText');
      var loginForm = document.getElementById('loginForm');
      var ssoButton = document.getElementById('ssoButton');
      var previewButton = document.getElementById('previewButton');

      function applyRole(role) {
        activeRole = role;
        var profile = defaultProfiles[role];
        accountInput.value = profile.account;
        passwordInput.value = profile.password;
        roleSelector.querySelectorAll('.role-pill').forEach(function (button) {
          button.classList.toggle('active', button.dataset.role === role);
        });
        errorText.textContent = '';
      }

      function persistAndEnter(profile) {
        sessionStorage.setItem(authKey, '1');
        sessionStorage.setItem(profileKey, JSON.stringify(profile));
        window.location.href = routeMap[profile.role] || routeMap.user;
      }

      roleSelector.addEventListener('click', function (event) {
        var button = event.target.closest('.role-pill');
        if (!button) return;
        applyRole(button.dataset.role);
      });

      loginForm.addEventListener('submit', function (event) {
        event.preventDefault();
        var account = accountInput.value.trim();
        var password = passwordInput.value.trim();
        if (!account || !password) {
          errorText.textContent = '请输入账号和密码。';
          return;
        }
        var profile = defaultProfiles[activeRole];
        persistAndEnter({ account: account, name: profile.name, role: activeRole });
      });

      ssoButton.addEventListener('click', function () {
        persistAndEnter(defaultProfiles[activeRole]);
      });

      previewButton.addEventListener('click', function () {
        window.location.href = './demo-mobile/?role=' + activeRole;
      });

      applyRole(activeRole);
    })();
  </script>
</body>
</html>
