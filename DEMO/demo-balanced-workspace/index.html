<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%2310a37f'/%3E%3Cpath d='M18 33h28M32 19v28' stroke='%23ffffff' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E" />
  <title>企业智能工作入口</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="workspace-shell">
    <aside class="history-rail">
      <div class="rail-top">
        <div class="brand-block">
          <p class="eyebrow">Enterprise AI</p>
          <div class="brand-lockup">
            <span class="brand-dot" aria-hidden="true"></span>
            <div class="brand-copy">
              <span class="brand-title">工作区</span>
              <span class="brand-subtitle">会话与任务</span>
            </div>
          </div>
        </div>
        <button class="primary-btn full-width new-chat-btn" id="newChatBtn" type="button">新建对话</button>
      </div>

      <section class="rail-section">
        <div class="section-head compact rail-head">
          <h2>会话</h2>
          <span class="meta-text" id="threadCount">0 条</span>
        </div>
        <div class="thread-list" id="threadList"></div>
      </section>
    </aside>

    <main class="workspace-main">
      <header class="topbar">
        <div class="topbar-copy">
          <p class="eyebrow">Enterprise AI</p>
          <div class="topbar-line">
            <h2>统一工作入口</h2>
            <span class="surface-pill">员工</span>
          </div>
        </div>
        <div class="topbar-actions">
          <a class="link-btn" href="../demo-mobile/?role=user" id="mobilePreviewLink">手机端预览</a>
          <button class="link-btn" id="logoutButton" type="button">退出登录</button>
          <div class="avatar" id="userAvatar">张</div>
        </div>
      </header>

      <section class="composer-card">
        <textarea id="mainPrompt" rows="4" placeholder="输入需求，例如：帮我预定明天下午的项目评审会议。"></textarea>
        <div class="composer-footer">
          <div class="chip-row" id="quickActionList"></div>
          <button class="primary-btn" id="startTaskBtn" type="button">发送</button>
        </div>
      </section>

      <section class="workspace-grid">
        <section class="panel chat-panel">
          <div class="section-head">
            <h2>对话</h2>
            <span class="meta-text" id="messageCount">0 条</span>
          </div>
          <div class="message-list" id="messageList"></div>
        </section>

        <aside class="side-stack">
          <section class="panel status-panel">
            <div class="section-head">
              <div>
                <p class="section-kicker">执行状态</p>
                <h2 id="statusTitle">当前任务</h2>
              </div>
              <span class="status-pill status-idle" id="statusBadge">可发起</span>
            </div>
            <p class="status-summary" id="statusSummary"></p>
            <div class="status-meta" id="statusMeta"></div>
            <div class="step-list" id="statusSteps"></div>
            <div class="action-row">
              <button class="secondary-btn" id="advanceBtn" type="button">开始处理</button>
              <button class="primary-btn" id="confirmBtn" type="button">确认执行</button>
            </div>
          </section>

          <section class="panel tool-panel">
            <div class="section-head">
              <div>
                <p class="section-kicker">部门工具</p>
                <h2>工具专区</h2>
              </div>
              <span class="meta-text" id="toolCount">0 个</span>
            </div>
            <div class="tool-feedback is-hidden" id="toolFeedback"></div>
            <div class="tool-list" id="toolList"></div>
          </section>
        </aside>
      </section>
    </main>
  </div>

  <script>
    (function () {
      var authKey = 'enterprise-ai-demo-auth';
      var profileKey = 'enterprise-ai-demo-profile';
      if (!sessionStorage.getItem(authKey)) {
        window.location.replace('../index.html');
        return;
      }
      var profile = {};
      try {
        profile = JSON.parse(sessionStorage.getItem(profileKey) || '{}');
      } catch (error) {
        profile = {};
      }
      if (profile.role === 'admin') {
        window.location.replace('../demo-admin-console/');
        return;
      }
      var avatar = document.getElementById('userAvatar');
      if (avatar) {
        avatar.textContent = (profile.name || '张三').slice(-1);
      }
      document.getElementById('logoutButton').addEventListener('click', function () {
        sessionStorage.removeItem(authKey);
        sessionStorage.removeItem(profileKey);
        window.location.replace('../index.html');
      });
    })();
  </script>
  <script src="../shared/demo-flow.js"></script>
  <script src="../shared/chat-feedback.js"></script>
  <script src="./app.js"></script>
</body>
</html>
