<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%2310a37f'/%3E%3Cpath d='M18 33h28M32 19v28' stroke='%23ffffff' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E" />
  <title>企业智能工作入口 | 入口导航</title>
  <style>
    :root {
      color-scheme: light;
      --panel: rgba(255, 255, 255, 0.94);
      --panel-strong: rgba(252, 252, 249, 0.98);
      --border: rgba(32, 33, 35, 0.08);
      --text: #202123;
      --muted: #6e6e80;
      --accent: #10a37f;
      --shadow: 0 18px 56px rgba(15, 23, 42, 0.07);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 0%, rgba(16, 163, 127, 0.08), transparent 22%),
        radial-gradient(circle at 100% 0%, rgba(0, 0, 0, 0.04), transparent 20%),
        linear-gradient(180deg, #fcfcf9 0%, #f3f4ee 100%);
    }
    main {
      width: min(1120px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }
    .top-shell,
    .note,
    .card {
      border-radius: 28px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, var(--panel-strong), var(--panel));
      box-shadow: var(--shadow);
    }
    .top-shell {
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .eyebrow {
      margin: 0 0 6px;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
    }
    h1,
    h2 {
      margin: 0;
      letter-spacing: -0.03em;
    }
    .top-shell p,
    .note,
    .card p {
      color: var(--muted);
      line-height: 1.72;
    }
    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .session-badge,
    .note,
    .meta-tag {
      font-size: 13px;
    }
    .session-badge,
    .meta-tag {
      min-height: 36px;
      padding: 0 14px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.84);
      color: var(--muted);
    }
    .button {
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.84);
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }
    .note {
      margin-top: 18px;
      padding: 14px 18px;
      background: rgba(16, 163, 127, 0.08);
      border-color: rgba(16, 163, 127, 0.14);
    }
    .grid {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }
    .card {
      padding: 24px;
      display: grid;
      gap: 16px;
    }
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .open-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      text-decoration: none;
      background: #202123;
      color: #ffffff;
      font-weight: 700;
    }
    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .top-shell {
        flex-direction: column;
        align-items: start;
      }
    }
    @media (max-width: 720px) {
      main {
        width: min(100vw - 24px, 1120px);
        padding: 20px 0 36px;
      }
      .top-shell,
      .card,
      .note {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="top-shell">
      <div>
        <p class="eyebrow">Enterprise AI</p>
        <h1>入口导航</h1>
        <p>登录后可进入用户入口、管理员控制台和手机端。</p>
      </div>
      <div class="top-actions">
        <span class="session-badge" id="sessionBadge">当前登录：当前用户</span>
        <button class="button" id="logoutButton" type="button">退出登录</button>
      </div>
    </section>

    <div class="note"><strong>说明：</strong>当前页用于切换不同终端入口，正式使用时将直接进入统一工作入口。</div>

    <section class="grid">
      <article class="card">
        <div>
          <p class="eyebrow">User</p>
          <h2>用户入口</h2>
        </div>
        <p>统一对话入口、历史对话、部门工具专区。</p>
        <div class="meta-row">
          <span class="meta-tag">对话优先</span>
          <span class="meta-tag">保留历史记录</span>
          <span class="meta-tag">支持反馈</span>
        </div>
        <a class="open-link" href="./demo-balanced-workspace/">打开</a>
      </article>

      <article class="card">
        <div>
          <p class="eyebrow">Admin</p>
          <h2>管理员控制台</h2>
        </div>
        <p>查看 Tokens、成本、反馈记录和工具权限。</p>
        <div class="meta-row">
          <span class="meta-tag">趋势图</span>
          <span class="meta-tag">数据表</span>
          <span class="meta-tag">邮件反馈</span>
        </div>
        <a class="open-link" href="./demo-admin-console/">打开</a>
      </article>

      <article class="card">
        <div>
          <p class="eyebrow">Mobile</p>
          <h2>手机端</h2>
        </div>
        <p>查看手机端发起、跟进和管理员摘要。</p>
        <div class="meta-row">
          <span class="meta-tag">角色切换</span>
          <span class="meta-tag">移动端摘要</span>
        </div>
        <a class="open-link" href="./demo-mobile/">打开</a>
      </article>
    </section>
  </main>

  <script>
    (function () {
      var authKey = 'enterprise-ai-demo-auth';
      var profileKey = 'enterprise-ai-demo-profile';
      if (!sessionStorage.getItem(authKey)) {
        window.location.replace('./index.html');
        return;
      }
      var profile = {};
      try {
        profile = JSON.parse(sessionStorage.getItem(profileKey) || '{}');
      } catch (error) {
        profile = {};
      }
      var sessionBadge = document.getElementById('sessionBadge');
      sessionBadge.textContent = '当前登录：' + (profile.name || '当前用户');
      document.getElementById('logoutButton').addEventListener('click', function () {
        sessionStorage.removeItem(authKey);
        sessionStorage.removeItem(profileKey);
        window.location.replace('./index.html');
      });
    })();
  </script>
</body>
</html>
