<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%2310a37f'/%3E%3Cpath d='M18 33h28M32 19v28' stroke='%23ffffff' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E" />
  <title>企业 AI 运营与治理控制台</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="dashboard-shell">
    <header class="topbar">
      <div class="topbar-copy">
        <p class="eyebrow">Enterprise AI</p>
        <div class="topbar-line">
          <h1>运营与治理控制台</h1>
          <span class="surface-pill">管理员</span>
        </div>
      </div>
      <div class="top-actions">
        <a class="button secondary" href="../demo-mobile/?role=admin">手机端预览</a>
        <button class="button secondary" id="logoutButton" type="button">退出登录</button>
        <span class="user-pill" id="adminName">周敏</span>
      </div>
    </header>

    <section class="metric-grid">
      <article class="metric-card"><span>今日 Tokens</span><strong id="metricTokens">0</strong><small id="metricTokensHint">-</small></article>
      <article class="metric-card"><span>今日成本</span><strong id="metricCost">0</strong><small id="metricCostHint">-</small></article>
      <article class="metric-card"><span>活跃用户</span><strong id="metricUsers">0</strong><small id="metricUsersHint">-</small></article>
      <article class="metric-card"><span>待处理事项</span><strong id="metricApprovals">0</strong><small id="metricApprovalsHint">-</small></article>
      <article class="metric-card"><span>正向反馈</span><strong id="metricPositive">0</strong><small id="metricPositiveHint">-</small></article>
      <article class="metric-card"><span>反馈邮件</span><strong id="metricMails">0</strong><small id="metricMailsHint">-</small></article>
    </section>

    <section class="trend-grid">
      <article class="panel wide">
        <div class="panel-head">
          <div>
            <p class="card-kicker">数据趋势</p>
            <h3>Tokens 与成本</h3>
          </div>
        </div>
        <div class="trend-layout">
          <div class="chart-shell">
            <div class="chart-legend">
              <span><i class="legend-dot tokens"></i>Tokens</span>
              <span><i class="legend-dot cost"></i>成本</span>
            </div>
            <svg id="trendChart" viewBox="0 0 720 240" aria-label="Tokens 与成本趋势图"></svg>
          </div>
          <div class="table-shell">
            <table class="metric-table">
              <thead>
                <tr>
                  <th>模块</th>
                  <th>调用量</th>
                  <th>Tokens</th>
                  <th>成本</th>
                  <th>状态</th>
                </tr>
              </thead>
              <tbody id="metricTableBody"></tbody>
            </table>
          </div>
        </div>
      </article>
    </section>

    <section class="dashboard-grid">
      <article class="panel wide">
        <div class="panel-head">
          <div>
            <p class="card-kicker">用户反馈</p>
            <h3>反馈记录</h3>
          </div>
          <span class="badge" id="feedbackMailBadge">等待反馈</span>
        </div>
        <div class="tag-row" id="feedbackOverview"></div>
        <div class="feedback-list" id="feedbackList"></div>
      </article>

      <article class="panel">
        <div class="panel-head">
          <div>
            <p class="card-kicker">共享任务</p>
            <h3>任务队列</h3>
          </div>
        </div>
        <div class="stack-list" id="sharedTaskList"></div>
      </article>

      <article class="panel">
        <div class="panel-head">
          <div>
            <p class="card-kicker">待处理事项</p>
            <h3>审批与确认</h3>
          </div>
        </div>
        <div class="stack-list" id="approvalList"></div>
      </article>

      <article class="panel">
        <div class="panel-head">
          <div>
            <p class="card-kicker">治理告警</p>
            <h3>风险提示</h3>
          </div>
        </div>
        <div class="stack-list" id="alertList"></div>
      </article>

      <article class="panel wide tool-governance-panel" id="toolGovernancePanel">
        <div class="panel-head">
          <div>
            <p class="card-kicker">部门工具</p>
            <h3>工具权限</h3>
          </div>
          <span class="badge" id="toolGovernanceBadge">0 个工具</span>
        </div>
        <div class="tool-governance-grid">
          <div class="tool-governance-list" id="toolGovernanceList"></div>
          <div class="tool-governance-detail" id="toolGovernanceDetail"></div>
        </div>
      </article>
    </section>
  </main>

  <script>
    (function () {
      var authKey = 'enterprise-ai-demo-auth';
      var profileKey = 'enterprise-ai-demo-profile';
      if (!sessionStorage.getItem(authKey)) {
        window.location.replace('../index.html');
        return;
      }
      var profile = {};
      try {
        profile = JSON.parse(sessionStorage.getItem(profileKey) || '{}');
      } catch (error) {
        profile = {};
      }
      if (profile.role === 'user') {
        window.location.replace('../demo-balanced-workspace/');
        return;
      }
      document.getElementById('adminName').textContent = profile.name || '周敏';
      document.getElementById('logoutButton').addEventListener('click', function () {
        sessionStorage.removeItem(authKey);
        sessionStorage.removeItem(profileKey);
        window.location.replace('../index.html');
      });
    })();
  </script>
  <script src="../shared/demo-flow.js"></script>
  <script src="../shared/chat-feedback.js"></script>
  <script src="./app.js"></script>
</body>
</html>
